<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Selge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #ddd;
      border-top-color: #3d6f30;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 14px; }
    .status { margin-top: 12px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="msg">正在检查登录状态…</p>
    <div class="status" id="status"></div>
  </div>
  <script>
    const msg = document.getElementById('msg');
    const status = document.getElementById('status');
    let attempts = 0;
    const maxAttempts = 60; // 最多检查 60 秒

    function check() {
      attempts++;
      status.textContent = '第 ' + attempts + ' 次检查…';
      fetch('/api/me')
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data) {
          if (data.authenticated) {
            msg.textContent = '登录成功，正在返回…';
            // 延迟一下让用户看到成功提示
            setTimeout(function() {
              window.location.href = '/';
            }, 300);
          } else {
            throw new Error('未登录');
          }
        })
        .catch(function() {
          if (attempts >= maxAttempts) {
            msg.textContent = '登录超时，请重试';
            status.textContent = '';
          } else {
            setTimeout(check, 1000);
          }
        });
    }

    // 页面加载后 1 秒开始检查（给 Access 登录页时间）
    setTimeout(check, 1000);
  </script>
</body>
</html>
