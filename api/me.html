<!DOCTYPE html>
<html>
<body>
  <script>
    // 页面一加载就检查登录并跳转
    (async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        if (data.authenticated) {
          location.replace('/'); // 跳主页
        }
      } catch (e) {
        console.error(e);
      }
    })();
  </script>
  <p>登录成功，正在返回主页...</p>
</body>
</html>
